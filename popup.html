<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="topbar-left">
      <div class="logo">TB</div>
      <div class="topbar-title">
        <h1>TabBloom</h1>
        <div class="topbar-stats" id="stats">Loading…</div>
      </div>
    </div>

    <div class="topbar-center">
      <div class="toggle-group" id="modeToggle">
        <button class="btn active" data-mode="context">Context</button>
        <button class="btn" data-mode="domain">Domain</button>
        <button class="btn" data-mode="window">Window</button>
      </div>
    </div>

    <div class="topbar-actions">
      <button class="btn btn-primary" id="btnSave">Save</button>
      <button class="btn" id="btnSessions">History</button>
      <button class="btn btn-icon" id="btnTheme" title="Toggle theme">&#9681;</button>
      <button class="btn btn-icon" id="btnRefresh" title="Refresh">&#8635;</button>
    </div>
  </div>

  <div class="main">
    <div class="panel-left">
      <div class="search-container">
        <div class="search-wrapper">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <circle cx="10.5" cy="10.5" r="6.5"/><line x1="15.5" y1="15.5" x2="21" y2="21"/>
          </svg>
          <input class="search-input" id="searchInput" type="text" placeholder="Filter groups or tabs…" spellcheck="false">
        </div>
      </div>
      <div class="group-list" id="groupList">
        <div class="loading">
          <div class="loading-dots"><span></span><span></span><span></span></div>
        </div>
      </div>
    </div>

    <div class="panel-right" id="detailPanel">
      <div class="detail-empty">
        <div class="detail-empty-icon">&#9776;</div>
        <p>Select a group to browse its tabs</p>
      </div>
    </div>
  </div>

</div>

<div class="save-overlay" id="saveOverlay">
  <div class="save-dialog">
    <h3>Save Session</h3>
    <input type="text" id="saveNameInput" placeholder="Session name" spellcheck="false">
    <div class="save-dialog-actions">
      <button class="btn" id="saveCancelBtn">Cancel</button>
      <button class="btn btn-primary" id="saveConfirmBtn">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2>Session History</h2>
      <button class="modal-close" id="modalClose">&#x2715;</button>
    </div>
    <div class="modal-body" id="sessionList"></div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="grouper.js"></script>
<script src="popup.js"></script>
</body>
</html>
